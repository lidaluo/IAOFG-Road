# 数据配置
data:
  aoi_dir: E:/Code/spacenet/train/SN3_roads_train_AOI_3_Paris/AOI_3_Paris
  labels_dir: data/spacenet_labels
  image_size: [224, 224]  # 兼容 Swin-Tiny 预训练权重
  num_workers: 0  # Windows + 多库并用时更稳，避免 OpenMP 冲突
  val_ratio: 0.2
  split_seed: 42
  max_samples: 0  # 0 表示使用全部标签样本

# 模型配置
model:
  encoder: swin_tiny
  num_classes: 1  # 当前训练脚本固定二值分割输出1通道

# 训练配置
training:
  epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.0001
  lambda_seg: 1.0
  lambda_inter: 0.3
  lambda_orient: 0.3
  lambda_anchor: 0.1
  lambda_topo: 0.0
  # 道路/交叉口像素极少时用 pos_weight 拉起来（从日志看 seg_bce 是否仍主导；可调 20~120）
  seg_pos_weight: 120.0
  inter_pos_weight: 40.0
  use_dynamic_pos_weight: true
  use_dynamic_seg_pos_weight: true
  use_dynamic_inter_pos_weight: false
  min_pos_weight: 5.0
  max_pos_weight: 120.0
  # 前若干 epoch 以分割为主；inter/orient 若为 0 则两路头几乎不更新，epoch16 会突然接入
  seg_warmup_epochs: 8
  warmup_aux_lambda_inter: 0.05
  warmup_aux_lambda_orient: 0.05
  # 从辅助权重线性升到 lambda_inter/orient 的轮数（0 表示 warmup 后一步到全量）
  multitask_ramp_epochs: 8
  checkpoint_dir: checkpoints
  log_dir: logs
  batch_size: 2  # 适配 8G 显卡
  validate_every: 1
  save_visual_every: 1
  save_every: 5
  lr_scheduler_factor: 0.5
  lr_scheduler_patience: 3
  min_lr: 0.000001

# 推理配置
inference:
  threshold: 0.5
  nms_size: 3

evaluation:
  save_vectors_geojson: true
  # 评估阶段可适当放宽阈值，避免预测图全空导致 strict APLS 全 NaN
  post_threshold: 0.2
  post_nms_size: 3
  threshold_candidates: [0.1, 0.15, 0.2, 0.25, 0.3, 0.35]