# 上海 filtered：E:\Code\spacenet_filtered（images/masks/heatmap png + orientations npy）
data:
  layout: shanghai_flat
  root: E:/Code/spacenet_filtered
  images_subdir: images
  masks_subdir: masks
  heatmap_subdir: heatmap
  orientations_subdir: orientations
  orientation_ext: .npy
  image_size: [224, 224]
  num_workers: 0
  val_ratio: 0.2
  split_seed: 42
  max_samples: 0
  # 无 GeoJSON：评估仅用与预测相同的后处理建 GT 图
  gt_graph_source: postprocess

model:
  encoder: swin_tiny
  num_classes: 1

training:
  epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.0001
  lambda_seg: 1.0
  # 保分割：降低辅助任务权重，避免与分割抢梯度（见 config_shanghai_seg_focus.yaml 做短训对照）
  lambda_inter: 0.1
  lambda_orient: 0.1
  lambda_anchor: 0.08
  lambda_topo: 0.0
  seg_pos_weight: 60.0
  inter_pos_weight: 35.0
  use_dynamic_pos_weight: true
  use_dynamic_seg_pos_weight: true
  use_dynamic_inter_pos_weight: false
  min_pos_weight: 5.0
  max_pos_weight: 80.0
  seg_warmup_epochs: 5
  warmup_aux_lambda_inter: 0.05
  warmup_aux_lambda_orient: 0.05
  multitask_ramp_epochs: 5
  checkpoint_dir: checkpoints_shanghai
  log_dir: logs_shanghai
  batch_size: 2
  validate_every: 1
  save_visual_every: 1
  save_every: 5
  lr_scheduler_factor: 0.5
  lr_scheduler_patience: 3
  min_lr: 0.000001

inference:
  threshold: 0.5
  nms_size: 3

evaluation:
  save_vectors_geojson: true
  post_threshold: 0.25
  post_nms_size: 3
  threshold_candidates: [0.1, 0.15, 0.2, 0.25, 0.3, 0.35]
